replicaCount: 1

image:
  repository: ghcr.io/rmyndharis/openwa
  tag: "0.4.6"
  pullPolicy: IfNotPresent

config:
  NODE_ENV: production
  API_PORT: "2785"
  LOG_LEVEL: info
  AUTO_START_SESSIONS: "false"
  DOMAIN: localhost
  CORS_ORIGINS: "*"
  SESSION_DATA_PATH: ./data/sessions
  PUPPETEER_HEADLESS: "true"
  PUPPETEER_ARGS: --no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu
  BAILEYS_AUTH_DIR: ./data/baileys
  BAILEYS_SYNC_FULL_HISTORY: "false"
  DATABASE_TYPE: sqlite
  POSTGRES_BUILTIN: "false"
  DATABASE_HOST: localhost
  DATABASE_PORT: "5432"
  DATABASE_NAME: openwa
  DATABASE_SYNCHRONIZE: "false"
  DATABASE_LOGGING: "false"
  MAIN_DATABASE_SYNCHRONIZE: "true"
  DATABASE_SSL: "false"
  DATABASE_SSL_REJECT_UNAUTHORIZED: "true"
  REDIS_ENABLED: "false"
  REDIS_BUILTIN: "false"
  REDIS_HOST: localhost
  REDIS_PORT: "6379"
  STORAGE_TYPE: local
  MINIO_BUILTIN: "false"
  STORAGE_LOCAL_PATH: ./data/media
  S3_ENDPOINT: http://localhost:9000
  S3_BUCKET: openwa
  S3_REGION: us-east-1
  WEBHOOK_TIMEOUT: "10000"
  WEBHOOK_MAX_RETRIES: "3"
  WEBHOOK_RETRY_DELAY: "5000"
  WEBHOOK_SSRF_PROTECT: "true"
  RATE_LIMIT_MEDIUM_TTL: "60000"
  RATE_LIMIT_MEDIUM_LIMIT: "100"
  PLUGINS_ENABLED: "true"
  PLUGINS_DIR: ./data/plugins
  ENABLE_SWAGGER: "true"

secret:
  create: true
  existingSecret: ""
  data:
    DATABASE_USERNAME: openwa
    DATABASE_PASSWORD: ""
    API_MASTER_KEY: ""
    REDIS_PASSWORD: ""
    S3_ACCESS_KEY: ""
    S3_SECRET_KEY: ""
    METRICS_TOKEN: ""

service:
  port: 80
  targetPort: 2785

ingress:
  enabled: true
  className: nginx
  host: openwa.example.com
  tls:
    enabled: true
    secretName: openwa-tls

persistence:
  mountPath: /app/data
  accessMode: ReadWriteOnce
  size: 10Gi
  storageClass: ""

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi
