apiVersion: v1
kind: Service
metadata:
  name: {{ include "openwa.fullname" . }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "openwa.name" . }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openwa.fullname" . }}-headless
spec:
  clusterIP: None
  selector:
    app: {{ include "openwa.name" . }}
  ports:
  - port: {{ .Values.service.targetPort }}
    name: http
